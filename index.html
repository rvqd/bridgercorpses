<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Join Server</title>

<style>
    @font-face {
        font-family: 'OCRA';
        src: url('ocraextended.ttf') format('truetype');
    }

    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #000;
        color: white;
        font-family: 'OCRA', monospace;
        overflow: hidden;
    }

    /* Star background */
    body::before {
        content: "";
        position: absolute;
        width: 200%;
        height: 200%;
        background-image:
            radial-gradient(2px 2px at 20% 30%, #ffffff, transparent),
            radial-gradient(1.5px 1.5px at 70% 80%, #ffffff, transparent),
            radial-gradient(1px 1px at 40% 60%, #ffffff, transparent),
            radial-gradient(2px 2px at 90% 10%, #ffffff, transparent),
            radial-gradient(1px 1px at 10% 90%, #ffffff, transparent),
            radial-gradient(1.5px 1.5px at 60% 40%, #ffffff, transparent);
        background-repeat: repeat;
        animation: moveStars 60s linear infinite;
        opacity: 0.4;
    }

    @keyframes moveStars {
        from { transform: translateY(0); }
        to { transform: translateY(-50%); }
    }

    .container {
        position: relative;
        z-index: 1;
        max-width: 500px;
        padding: 20px;
        text-align: center;
    }

    ol {
        text-align: left;
        line-height: 1.6;
        margin-bottom: 30px;
        opacity: 0.9;
    }

    button {
        width: 100%;
        padding: 14px;
        font-size: 1rem;
        border: none;
        border-radius: 10px;
        background: #a0c19d;
        color: #111;
        cursor: pointer;
        font-family: 'OCRA', monospace;
        transition: 0.2s;
        box-shadow: 0 0 8px rgba(160, 193, 157, 0.4);
    }

    button:hover {
        background: #8fb38c;
        box-shadow: 0 0 12px rgba(160, 193, 157, 0.6);
    }

    .code {
        margin-top: 15px;
        font-size: 0.85rem;
        word-break: break-all;
        display: none;
        opacity: 0.85;
    }
</style>
</head>

<body>

<div class="container">
    <ol>
        <li>Click the button</li>
        <li>Roblox opens</li>
        <li>Press F12</li>
        <li>Go to Console</li>
        <li>Paste command and press Enter</li>
    </ol>

    <button onclick="openRoblox()">Open Roblox & Show Join Command</button>

    <div id="codeBox" class="code"></div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const placeId = params.get('placeId');
    const jobId = params.get('jobId');

    function openRoblox() {
        if (!placeId || !jobId) {
            alert("Missing Place ID or Job ID");
            return;
        }

        window.open('https://www.roblox.com/home', '_blank');

        const box = document.getElementById('codeBox');
        box.style.display = 'block';
        box.textContent = `Roblox.GameLauncher.joinGameInstance(${placeId}, "${jobId}");`;
    }
</script>

</body>
</html>
