<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Exact Roblox Server</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0f0f0f; color: white; text-align: center; padding: 60px 20px; margin: 0; }
        h1 { color: #a0c19d; font-size: 2.6em; }
        .info { background: #1f1f1f; padding: 20px; border-radius: 12px; display: inline-block; margin: 20px 0; }
        button { background: #a0c19d; color: #111; font-size: 1.4em; padding: 16px 40px; border: none; border-radius: 12px; cursor: pointer; margin: 10px; transition: 0.2s; }
        button:hover { background: #8fb38c; transform: scale(1.05); }
        .console { background: #222; padding: 15px; border-radius: 8px; text-align: left; font-family: monospace; margin: 20px auto; max-width: 600px; white-space: pre-wrap; }
        .warning { color: #ffcc00; margin-top: 30px; }
    </style>
</head>
<body>
    <h1>🔗 JOIN EXACT SERVER</h1>
    <div class="info">
        <p><strong>Place ID:</strong> <span id="place"></span></p>
        <p><strong>Job ID:</strong> <span id="job"></span></p>
    </div>

    <button onclick="tryProtocol()">🚀 Launch Roblox Directly (Auto)</button>
    <button onclick="openRobloxAndShowCommand()">🌐 Open Roblox.com + Show Console Command</button>

    <div id="consoleBox" class="console" style="display:none;"></div>

    <p class="warning">
        The Console Method is currently the most reliable for public servers from another account.
    </p>

    <script>
        const params = new URLSearchParams(window.location.search);
        const placeId = params.get('placeId');
        const jobId = params.get('jobId');

        document.getElementById('place').textContent = placeId || 'N/A';
        document.getElementById('job').textContent = jobId || 'N/A';

        function tryProtocol() {
            if (!placeId || !jobId) return alert("Missing server info!");
            window.location.href = `roblox://experiences/start?placeId=${placeId}&gameInstanceId=${jobId}`;
        }

        function openRobloxAndShowCommand() {
            if (!placeId || !jobId) return alert("Missing server info!");
            // Open Roblox home in new tab
            window.open('https://www.roblox.com/home', '_blank');
            // Show command
            const box = document.getElementById('consoleBox');
            box.style.display = 'block';
            box.innerHTML = `// 1. Roblox.com should now be open in another tab\n// 2. Press F12 → go to Console tab\n// 3. Paste this line and press Enter:\nRoblox.GameLauncher.joinGameInstance(${placeId}, "${jobId}");`;
        }

        // Auto attempt protocol on load
        window.onload = () => setTimeout(tryProtocol, 800);
    </script>
</body>
</html>
